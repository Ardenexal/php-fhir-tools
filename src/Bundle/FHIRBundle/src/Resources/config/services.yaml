services:
    _defaults:
        autowire: true
        autoconfigure: true
        public: false

    # FHIRPath Service
    Ardenexal\FHIRTools\Component\FHIRPath\Service\FHIRPathService:
        public: true

    # FHIRPath Console Commands
    Ardenexal\FHIRTools\Bundle\FHIRBundle\Command\FHIRPathEvaluateCommand:
        arguments:
            $pathService: '@Ardenexal\FHIRTools\Component\FHIRPath\Service\FHIRPathService'
        tags: ["console.command"]

    Ardenexal\FHIRTools\Bundle\FHIRBundle\Command\FHIRPathValidateCommand:
        arguments:
            $pathService: '@Ardenexal\FHIRTools\Component\FHIRPath\Service\FHIRPathService'
        tags: ["console.command"]

    # Code Generation Commands
    Ardenexal\FHIRTools\Component\CodeGeneration\Command\FHIRModelGeneratorCommand:
        tags: ["console.command"]

    Ardenexal\FHIRTools\Component\CodeGeneration\Command\FHIRIGGeneratorCommand:
        arguments:
            $configuredPackages: '%fhir.ig.packages%'
            $offlineByDefault: '%fhir.ig.offline%'
            $igOutputDirectory: '%fhir.ig.output_directory%'
            $igBaseNamespace: '%fhir.ig.namespace%'
        tags: ["console.command"]

    # Code Generation Services
    Ardenexal\FHIRTools\Component\CodeGeneration\Context\BuilderContext: ~

    Ardenexal\FHIRTools\Component\CodeGeneration\Generator\FHIRModelGenerator:
        public: true

    Ardenexal\FHIRTools\Component\CodeGeneration\Generator\FHIRExtensionGenerator: ~

    Ardenexal\FHIRTools\Component\CodeGeneration\Generator\FHIRProfileGenerator: ~

    Ardenexal\FHIRTools\Component\CodeGeneration\Package\PackageLoader:
        public: true

    Ardenexal\FHIRTools\Component\CodeGeneration\Generator\ErrorCollector:
        public: true

    Ardenexal\FHIRTools\Component\CodeGeneration\Package\RetryHandler:
        public: true

    # Serialization - Metadata
    Ardenexal\FHIRTools\Component\Serialization\Metadata\PropertyMetadataProvider: ~

    Ardenexal\FHIRTools\Component\Serialization\Metadata\FHIRMetadataExtractor:
        arguments:
            $propertyMetadataProvider: '@Ardenexal\FHIRTools\Component\Serialization\Metadata\PropertyMetadataProvider'

    Ardenexal\FHIRTools\Component\Serialization\Metadata\FHIRMetadataExtractorInterface:
        alias: 'Ardenexal\FHIRTools\Component\Serialization\Metadata\FHIRMetadataExtractor'
        public: true

    # Serialization - IG Type Registry (maps populated by FHIRIGRegistryCompilerPass at container build time)
    Ardenexal\FHIRTools\Component\Metadata\FHIRIGTypeRegistry: ~

    # Serialization - Type Resolver
    Ardenexal\FHIRTools\Component\Serialization\FHIRTypeResolver: ~

    Ardenexal\FHIRTools\Component\Serialization\FHIRTypeResolverInterface:
        alias: 'Ardenexal\FHIRTools\Component\Serialization\FHIRTypeResolver'

    # Serialization - Context helpers
    Ardenexal\FHIRTools\Component\Serialization\Context\FHIRSerializationContextFactory: ~

    # FHIRSerializationDebugInfo is a value object; provide default scalar args for the DI container.
    Ardenexal\FHIRTools\Component\Serialization\Context\FHIRSerializationDebugInfo:
        arguments:
            $operation: "initial"
            $format: "json"

    # Serialization - Validator
    Ardenexal\FHIRTools\Component\Serialization\Validator\FHIRValidator:
        public: true

    # Serialization - per-version normalizer stacks, Serializer instances, FHIRSerializationService
    # instances, FHIRVersionedSerializationServiceLocator, and backward-compat aliases are all
    # registered programmatically by FHIRVersionedSerializerPass at container compile time.
    #
    # The stubs below satisfy pre-compile container checks (e.g. unit tests that introspect the
    # container before compilation). FHIRVersionedSerializerPass replaces both with versioned
    # aliases at compile time via setAlias(), which removes any prior definition with the same ID.
    Ardenexal\FHIRTools\Component\Serialization\FHIRSerializationService:
        public: true

    fhir.serialization_service:
        alias: 'Ardenexal\FHIRTools\Component\Serialization\FHIRSerializationService'
        public: true

    # Validation
    Ardenexal\FHIRTools\Component\Validation\FHIRValidationMessageRegistry:
        public: true

    fhir.validation_message_registry:
        alias: 'Ardenexal\FHIRTools\Component\Validation\FHIRValidationMessageRegistry'
        public: true

    Ardenexal\FHIRTools\Component\Validation\Validator\FHIRPathInvariantValidator:
        arguments:
            $pathService: '@Ardenexal\FHIRTools\Component\FHIRPath\Service\FHIRPathService'
            $messageRegistry: '@Ardenexal\FHIRTools\Component\Validation\FHIRValidationMessageRegistry'
        tags:
            - { name: 'validator.constraint_validator', alias: 'Ardenexal\FHIRTools\Component\Metadata\Attribute\Validation\FHIRPathInvariantValidator' }
        public: true

    Ardenexal\FHIRTools\Component\Validation\NullFHIRTerminologyClient: ~

    # To use a real terminology server, override the FHIRTerminologyClientInterface alias in your
    # application's services.yaml and register HttpFHIRTerminologyClient with your server URL:
    #
    #   Ardenexal\FHIRTools\Component\Validation\HttpFHIRTerminologyClient:
    #       arguments:
    #           $serverUrl: '%env(FHIR_TERMINOLOGY_SERVER_URL)%'
    #   Ardenexal\FHIRTools\Component\Validation\FHIRTerminologyClientInterface:
    #       alias: 'Ardenexal\FHIRTools\Component\Validation\HttpFHIRTerminologyClient'
    Ardenexal\FHIRTools\Component\Validation\FHIRTerminologyClientInterface:
        alias: 'Ardenexal\FHIRTools\Component\Validation\NullFHIRTerminologyClient'

    Ardenexal\FHIRTools\Component\Validation\Validator\FHIRValueSetBindingValidator:
        arguments:
            $messageRegistry: '@Ardenexal\FHIRTools\Component\Validation\FHIRValidationMessageRegistry'
            $enumNamespaceRoots:
                - 'Ardenexal\FHIRTools\Component\Models\R4\Enum'
                - 'Ardenexal\FHIRTools\Component\Models\R4B\Enum'
                - 'Ardenexal\FHIRTools\Component\Models\R5\Enum'
            $terminologyClient: '@Ardenexal\FHIRTools\Component\Validation\FHIRTerminologyClientInterface'
        tags:
            - { name: 'validator.constraint_validator', alias: 'Ardenexal\FHIRTools\Component\Metadata\Attribute\Validation\FHIRValueSetBindingValidator' }

    Ardenexal\FHIRTools\Component\Validation\Validator\FHIRFixedValueValidator:
        arguments:
            $messageRegistry: '@Ardenexal\FHIRTools\Component\Validation\FHIRValidationMessageRegistry'
        tags:
            - { name: 'validator.constraint_validator', alias: 'Ardenexal\FHIRTools\Component\Metadata\Attribute\Validation\FHIRFixedValueValidator' }

    Ardenexal\FHIRTools\Component\Validation\Validator\FHIRPatternValueValidator:
        arguments:
            $messageRegistry: '@Ardenexal\FHIRTools\Component\Validation\FHIRValidationMessageRegistry'
        tags:
            - { name: 'validator.constraint_validator', alias: 'Ardenexal\FHIRTools\Component\Metadata\Attribute\Validation\FHIRPatternValueValidator' }

    Ardenexal\FHIRTools\Component\Validation\Validator\FHIRProfileConstraintValidator:
        tags:
            - { name: 'validator.constraint_validator', alias: 'Ardenexal\FHIRTools\Component\Metadata\Attribute\Validation\FHIRProfileConstraintValidator' }

    Ardenexal\FHIRTools\Component\Validation\SliceDiscriminatorMatcher: ~

    Ardenexal\FHIRTools\Component\Validation\Validator\FHIRSliceConstraintValidator:
        tags:
            - { name: 'validator.constraint_validator', alias: 'Ardenexal\FHIRTools\Component\Metadata\Attribute\Validation\FHIRSliceConstraintValidator' }

    Ardenexal\FHIRTools\Component\Validation\NullFHIRReferenceResolver: ~

    Ardenexal\FHIRTools\Component\Validation\FHIRReferenceResolverInterface:
        alias: 'Ardenexal\FHIRTools\Component\Validation\NullFHIRReferenceResolver'

    Ardenexal\FHIRTools\Component\Validation\Validator\FHIRTargetProfileValidator:
        arguments:
            $resolver: '@Ardenexal\FHIRTools\Component\Validation\FHIRReferenceResolverInterface'
            $messageRegistry: '@Ardenexal\FHIRTools\Component\Validation\FHIRValidationMessageRegistry'
        tags:
            - { name: 'validator.constraint_validator', alias: 'Ardenexal\FHIRTools\Component\Metadata\Attribute\Validation\FHIRTargetProfileValidator' }

    # Type hierarchy resolver — enables inheritance-aware extension context validation
    # (supertype and foreign-root type-path contexts). Monotonic: only removes false positives.
    Ardenexal\FHIRTools\Component\Validation\FhirPropertyTypeHierarchyResolver: ~

    Ardenexal\FHIRTools\Component\Validation\FHIRTypeHierarchyResolverInterface:
        alias: 'Ardenexal\FHIRTools\Component\Validation\FhirPropertyTypeHierarchyResolver'

    # Validation Service
    Ardenexal\FHIRTools\Component\Validation\FHIRValidationService:
        public: true

    Ardenexal\FHIRTools\Component\Validation\FHIRValidationServiceInterface:
        alias: 'Ardenexal\FHIRTools\Component\Validation\FHIRValidationService'
        public: true

    fhir.validation_service:
        alias: 'Ardenexal\FHIRTools\Component\Validation\FHIRValidationService'
        public: true

    # Named service aliases
    fhir.model_generator:
        alias: 'Ardenexal\FHIRTools\Component\CodeGeneration\Generator\FHIRModelGenerator'
        public: true

    fhir.package_loader:
        alias: 'Ardenexal\FHIRTools\Component\CodeGeneration\Package\PackageLoader'
        public: true

    fhir.validator:
        alias: 'Ardenexal\FHIRTools\Component\Serialization\Validator\FHIRValidator'
        public: true
